<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Platform ops — Veil</title>
  <link rel="stylesheet" href="portal/common.css" />
  <link rel="icon" href="portal/favicon.png" sizes="48x48" />
</head>
<body>
  <div class="layout">
    <nav class="nav" data-portal-nav></nav>
    <div class="card">
      <h1>Platform operations</h1>
      <p class="lede">In-house health and client telemetry for Veil. No third-party APM — metadata only, no secrets.</p>
      <form id="ops-form" class="form-stack">
        <label class="field">
          <span>Ops token</span>
          <input type="password" id="ops-token" autocomplete="off" placeholder="PLATFORM_OPS_TOKEN from server env" />
        </label>
        <label class="field">
          <span>Window (days)</span>
          <input type="number" id="ops-days" min="1" max="30" value="7" />
        </label>
        <button type="submit" class="btn">Load summary</button>
        <p class="hint" id="ops-status"></p>
      </form>
      <div id="ops-summary"></div>
    </div>
    <footer class="site-footer" data-portal-footer></footer>
  </div>
  <script src="portal/config.js"></script>
  <script src="portal/app.js"></script>
  <script src="portal/nav.js"></script>
  <script src="portal/contacts.js"></script>
  <script src="portal/ops.js"></script>
  <script>
    GoldspirePortalNav.renderPortalNav('ops');
    GoldspirePortalNav.renderPortalFooter?.();
    GoldspirePortalContacts?.applyContactEmails?.();
    GoldspirePortalOps.init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join organization — Goldspire Secure Text</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      line-height: 1.5;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1419;
      color: #e7ecf3;
    }
    main {
      width: min(420px, calc(100vw - 2rem));
      background: #171d26;
      border: 1px solid #2a3444;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { margin: 0 0 1rem; color: #aab4c3; font-size: 0.95rem; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.35rem; color: #c8d0dc; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #3a4658;
      background: #0f1419;
      color: inherit;
      font-size: 1rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.7rem 1rem;
      border: 0;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .status { margin-top: 1rem; min-height: 1.25rem; font-size: 0.9rem; }
    .status.error { color: #f87171; }
    .status.ok { color: #4ade80; }
  </style>
</head>
<body>
  <main>
    <h1>Join your organization</h1>
    <p>Enter the join code from your admin. This page connects your browser extension to your team vault.</p>
    <form id="join-form">
      <label for="join-code">Join code</label>
      <input id="join-code" name="joinCode" autocomplete="off" placeholder="DEMO-N0VA7" required />
      <button type="submit" id="submit-btn">Connect extension</button>
    </form>
    <div id="status" class="status" role="status"></div>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const deviceId = params.get('device_id') || '';
    const extensionId = params.get('extension_id') || '';
    const statusEl = document.getElementById('status');
    const form = document.getElementById('join-form');
    const submitBtn = document.getElementById('submit-btn');

    function setStatus(message, kind) {
      statusEl.textContent = message;
      statusEl.className = 'status' + (kind ? ' ' + kind : '');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const joinCode = document.getElementById('join-code').value.trim();
      if (!joinCode) return;

      submitBtn.disabled = true;
      setStatus('Joining…');

      try {
        const response = await fetch('/v1/extension/org/join', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Device-Id': deviceId || crypto.randomUUID(),
          },
          body: JSON.stringify({
            joinCode,
            deviceId: deviceId || crypto.randomUUID(),
          }),
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.message || payload.error || 'Join failed.');
        }

        if (extensionId && typeof chrome !== 'undefined' && chrome.runtime?.sendMessage) {
          await chrome.runtime.sendMessage(extensionId, {
            type: 'ORG_PROVISION',
            payload,
          });
          setStatus('Connected. You can close this tab and return to the extension.', 'ok');
        } else {
          setStatus('Joined successfully. Return to the extension popup to finish setup.', 'ok');
        }
      } catch (err) {
        setStatus(err.message || 'Join failed.', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    if (!deviceId) {
      setStatus('Open this page from the extension sign-in button for automatic device pairing.');
    }
  </script>
</body>
</html>
